# This is an example and generic rbac role definition for stolon. It could be
# fine tuned and split per component.
# The required permission per component should be:
# keeper/proxy/sentinel: update their own pod annotations
# sentinel/stolonctl: get, create, update configmaps or secrets, depending on
# the configured --kube-resource-kind
# sentinel: get, create, update leases for leader election
# sentinel: get, create, update services and endpointslices when Kubernetes
# service publishing is enabled
# sentinel/stolonctl: list components pods
# sentinel/stolonctl: get components pods annotations

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: stolon
  namespace: default
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - configmaps
  - secrets
  - services
  - events
  verbs:
  - "*"
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  verbs:
  - "*"
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - "*"
