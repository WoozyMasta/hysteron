---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hysteron-proxy
spec:
  minReplicas: 2
  maxReplicas: 6

  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hysteron-proxy

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
