---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hysteron-proxy
spec:
  replicas: 2
  template:
    spec:
      serviceAccountName: hysteron
      containers:
        - name: proxy
          image: docker.io/woozymasta/hysteron:latest
          command:
            - /bin/hysteron
            - proxy
            - kubernetes

          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 600m
              memory: 384Mi

          envFrom:
            - configMapRef:
                name: hysteron-common-env
            - configMapRef:
                name: hysteron-proxy-env

          ports:
            - name: postgres-rw
              containerPort: 5432
            - name: postgres-ro
              containerPort: 5433
            - name: metrics
              containerPort: 9108
            - name: health
              containerPort: 8081

          livenessProbe:
            httpGet:
              path: /health/live
              port: health
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
            # Optional alternative:
            # tcpSocket:
            #   port: postgres-rw
          readinessProbe:
            httpGet:
              path: /health/ready
              port: health
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
            # Optional alternative:
            # tcpSocket:
            #   port: postgres-rw
