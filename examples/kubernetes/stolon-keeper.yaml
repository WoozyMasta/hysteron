# PetSet was renamed to StatefulSet in k8s 1.5
# apiVersion: apps/v1alpha1
# kind: PetSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hysteron-keeper
spec:
  serviceName: "hysteron-keeper"
  replicas: 2
  selector:
    matchLabels:
      component: hysteron-keeper
      hysteron-cluster: kube-hysteron
  template:
    metadata:
      labels:
        component: hysteron-keeper
        hysteron-cluster: kube-hysteron
      annotations:
        pod.alpha.kubernetes.io/initialized: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: hysteron-keeper
          image: sorintlab/hysteron:master-pg10
          command:
            - "/bin/bash"
            - "-ec"
            - |
              # Generate our keeper uid using the pod index
              IFS='-' read -ra ADDR <<< "$(hostname)"
              export HYSTERON_UID="keeper${ADDR[-1]}"
              export POD_IP=$(hostname -i)
              export HYSTERON_PG_LISTEN_ADDRESS=$POD_IP
              export HYSTERON_DATA=/hysteron-data
              chown hysteron:hysteron $HYSTERON_DATA
              exec gosu hysteron hysteron keeper kubernetes -- --data-dir $HYSTERON_DATA
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: HYSTERON_CLUSTER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['hysteron-cluster']
            - name: HYSTERON_K8S_RESOURCE_KIND
              value: "configmap"
            - name: HYSTERON_PG_REPL_USERNAME
              value: "repluser"
              # Or use a password file like in the below supersuser password
            - name: HYSTERON_PG_REPL_PASSWORD
              value: "replpassword"
            - name: HYSTERON_PG_SU_USERNAME
              value: "hysteron"
            - name: HYSTERON_PG_SU_PASSWORDFILE
              value: "/etc/secrets/hysteron/password"
            - name: HYSTERON_METRICS_LISTEN_ADDRESS
              value: "0.0.0.0:8080"
            # Uncomment this to enable debug logs
            #- name: HYSTERON_DEBUG
            #  value: "true"
          ports:
            - containerPort: 5432
            - containerPort: 8080
          volumeMounts:
            - mountPath: /hysteron-data
              name: data
            - mountPath: /etc/secrets/hysteron
              name: hysteron
      volumes:
        - name: hysteron
          secret:
            secretName: hysteron
  # Define your own volumeClaimTemplate. This example uses dynamic PV provisioning with a storage class named "standard" (so it will works by default with minikube)
  # In production you should use your own defined storage-class and configure your persistent volumes (statically or dynamically using a provisioner, see related k8s doc).
  volumeClaimTemplates:
    - metadata:
        name: data
        annotations:
          volume.alpha.kubernetes.io/storage-class: standard
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 512Mi

