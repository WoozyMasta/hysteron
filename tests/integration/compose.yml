services:
  integration:
    build:
      context: ../..
      dockerfile: tests/integration/Dockerfile
      args:
        GO_VERSION: ${GO_VERSION:-1.26}
        PG_MAJOR: ${PG_MAJOR:-18}
    environment:
      DEBUG: ${INTEGRATION_DEBUG:-}
      INTEGRATION_STORE_BACKEND: etcdv3
    volumes:
      - ../..:/workspace
      - go-mod:/go/pkg/mod
      - go-build:/root/.cache/go-build
    working_dir: /workspace

volumes:
  go-build:
  go-mod:
