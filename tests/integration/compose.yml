services:
  integration:
    build:
      context: ../..
      dockerfile: tests/integration/Dockerfile
      args:
        GO_VERSION: ${GO_VERSION:-1.26.3}
        PG_MAJOR: ${PG_MAJOR:-18}
    environment:
      DEBUG: ${INTEGRATION_DEBUG:-}
      DOC_BUILD: "0"
      GOCACHE: /tmp/go-build
      GOTOOLCHAIN: auto
      GOFLAGS: -buildvcs=false -trimpath
      GOMODCACHE: /tmp/go-mod
      INTEGRATION_RUN: ${INTEGRATION_RUN:-}
      INTEGRATION_PROFILE: ${INTEGRATION_PROFILE:-}
      INTEGRATION_REPORT: ${INTEGRATION_REPORT:-1}
      PG_MAJOR: ${PG_MAJOR:-18}
      INTEGRATION_STORE_BACKEND: etcdv3
      INTEGRATION_TEST_ARGS: ${INTEGRATION_TEST_ARGS:-}
      INTEGRATION_TIMEOUT: ${INTEGRATION_TIMEOUT:-30m}
      INTEGRATION_PARALLEL: ${INTEGRATION_PARALLEL:-4}
      INTEGRATION_MAX_STORES: ${INTEGRATION_MAX_STORES:-8}
      HYSTERON_INTEGRATION_SOAK: ${HYSTERON_INTEGRATION_SOAK:-}
      HYSTERON_INTEGRATION_SOAK_FAILOVER_CYCLES: ${HYSTERON_INTEGRATION_SOAK_FAILOVER_CYCLES:-}
      OUTPUT_DIR: /tmp/hysteron-build
    user: postgres
    volumes:
      - ../..:/workspace
    working_dir: /workspace
