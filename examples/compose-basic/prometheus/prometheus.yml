global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: hysteron-sentinel
    static_configs:
      - targets:
          - sentinel1:9090
          - sentinel2:9090
  - job_name: hysteron-keeper
    static_configs:
      - targets:
          - keeper-a-1:9187
          - keeper-a-2:9187
          - keeper-b-1:9187
          - keeper-b-2:9187
  - job_name: hysteron-proxy
    static_configs:
      - targets:
          - proxy-a-1:9190
          - proxy-a-2:9190
          - proxy-b-1:9190
