---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hysteron-keeper
spec:
  template:
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/app: hysteron-second
